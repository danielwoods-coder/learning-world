<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lightbox Viewer</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div class="gallery">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/stonehenge-thumbnail.jpg" class="gallery-item" alt="Stonehenge">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/storm-thumbnail.jpg" class="gallery-item" alt="Storm">
    <img src="https://cdn.freecodecamp.org/curriculum/labs/trees-thumbnail.jpg" class="gallery-item" alt="Trees">
  </div>
  <div class="lightbox">
    <button id="close-btn" aria-label="Close">&times;</button>
    <button id="prev-btn" class="nav-btn" aria-label="Previous">&lt;</button>
    <button id="next-btn" class="nav-btn" aria-label="Next">&gt;</button>
    <img id="lightbox-image" alt="">
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>
  <script src="script.js"></script>
</body>

</html>
