<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <title>Styled To-Do List</title>
    <link rel="stylesheet" href="todo-list.css" />
  </head>

  <body>
    <h1>行动清单</h1>

    <ul class="todo-list">
      <li>
        <input type="checkbox" id="first" />
        <label for="first">学习一个HTML技能</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/zh-CN/"
              target="_blank"
              >MDN</a
            >是一个Web技术和标准的说明网站。
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="2nd" />
        <label for="2nd">学习Github</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://www.github.com"
              target="_blank"
              >Github</a
            >是利用git技术提供版本控制与代码托管服务的网站。
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="3rd" />
        <label for="3rd">看一本小说</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/zh-CN/"
              target="_blank"
              >***</a
            >是一部脍炙人口的作品，赢得无数赞誉。
          </li>
        </ul>
      </li>
      <li>
        <input type="checkbox" id="fourth" />
        <label for="fourth">体育锻炼一小时</label>
        <ul class="sub-item">
          <li>
            <a
              class="sub-item-link"
              href="https://developer.mozilla.org/zh-CN/"
              target="_blank"
              >体育</a
            >活动增强的人的体质和免疫力。
          </li>
        </ul>
      </li>
    </ul>
  </body>
</html>
