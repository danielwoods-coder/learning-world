<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playing Cards</title>
    <link rel="stylesheet" href="playing-cards.css" />
  </head>

  <body>
    <main id="playing-cards">
      <article class="card" aria-label="7 of Spades">
        <div class="corner top-left">
          <span class="rank">7</span>
          <span class="suit">♠</span>
        </div>
        <div class="center-suit">♠</div>
        <div class="corner bottom-right">
          <span class="rank">7</span>
          <span class="suit">♠</span>
        </div>
      </article>
      <article class="card hearts" aria-label="9 of Hearts">
        <div class="corner top-left">
          <span class="rank">9</span>
          <span class="suit">♥</span>
        </div>
        <div class="center-suit">♥</div>
        <div class="corner bottom-right">
          <span class="rank">9</span>
          <span class="suit">♥</span>
        </div>
      </article>
      <article class="card diamonds" aria-label="Jack of Diamonds">
        <div class="corner top-left">
          <span class="rank">J</span>
          <span class="suit">♦</span>
        </div>
        <div class="center-suit">♦</div>
        <div class="corner bottom-right">
          <span class="rank">J</span>
          <span class="suit">♦</span>
        </div>
      </article>
      <article class="card clubs" aria-label="10 of Clubs">
        <div class="corner top-left">
          <span class="rank">10</span>
          <span class="suit">♣</span>
        </div>
        <div class="center-suit">♣</div>
        <div class="corner bottom-right">
          <span class="rank">10</span>
          <span class="suit">♣</span>
        </div>
      </article>
      <article class="card hearts" aria-label="3 of Hearts">
        <div class="corner top-left">
          <span class="rank">3</span>
          <span class="suit">♥</span>
        </div>
        <div class="center-suit">♥</div>
        <div class="corner bottom-right">
          <span class="rank">3</span>
          <span class="suit">♥</span>
        </div>
      </article>
      <article class="card" aria-label="King of Spades">
        <div class="corner top-left">
          <span class="rank">K</span>
          <span class="suit">♠</span>
        </div>
        <div class="center-suit">♠</div>
        <div class="corner bottom-right">
          <span class="rank">K</span>
          <span class="suit">♠</span>
        </div>
      </article>
    </main>
  </body>
</html>
