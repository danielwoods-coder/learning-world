<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Post Card</title>
    <link href="blog-post-card.css" rel="stylesheet">
</head>

<body>
    <div class="blog-post-card">
        <img class="post-img" src="https://cdn.freecodecamp.org/curriculum/labs/cover-photo.jpg"
            alt="one person types in front of the computer">
        <div class="post-content">
            <h2 class="post-title">如何自学响应式的web技术</h2>
            <p class="post-excerpt">在过去的两周，我通过对HTML和CSS的了解初步掌握它们的基本……</p>
            <a class="read-more" href="https://www.freecodecamp.com">Read More</a>
        </div>
    </div>
</body>

</html>
