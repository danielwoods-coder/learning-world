<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="a-contact-form.css" />
</head>

<body>
  <div class="form-container">
    <form action="">
      <h2>联系人登记</h2>
      <div class="part">
        <label for="name">姓名：</label>
        <input type="text" id="name" name="name" required />
      </div>
      <div class="part">
        <label for="email">电邮：</label>
        <input type="email" id="email" name="email" required />
      </div>
      <div class="part">
        <label for="other">备注：</label>
        <textarea name="other" id="other" cols="30" rows="3" required></textarea>
      </div>

      <button type="submit">提交</button>
    </form>
  </div>
</body>

</html>
