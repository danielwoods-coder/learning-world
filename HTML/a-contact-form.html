<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Form</title>
  <link rel="stylesheet" href="a-contact-form.css" />
</head>

<body>
  <div class="form-container">
    <form action="" method="post" aria-label="联系表单">
      <h2>联系人登记</h2>
      <div class="part">
        <label for="name">姓名：</label>
        <input type="text" id="name" name="name" placeholder="请输入您的姓名" required />
      </div>
      <div class="part">
        <label for="email">电邮：</label>
        <input type="email" id="email" name="email" placeholder="请输入您的邮箱" required />
      </div>
      <div class="part">
        <label for="other">备注：</label>
        <textarea name="other" id="other" cols="30" rows="3" placeholder="请输入备注信息" required></textarea>
      </div>

      <button type="submit">提交</button>
    </form>
  </div>
</body>

</html>
