<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Business Card</title>
  <style>
    body {
      background-color: rosybrown;
      font-family: Arial, sans-serif;
    }

    p {
      margin-top: 5px;
      margin-bottom: 5px;
    }

    .business-card {
      width: 300px;
      background-color: yellow;
      border: 2px solid black;
      padding: 20px;
      margin-top: 100px;
      text-align: center;
      font-size: 16px;
      margin-left: auto;
      margin-right: auto;
    }

    .profile-image {
      max-width: 100%;
      height: 240px;
      width: 240px;
      margin-top: 8px;
    }

    .full-name {
      font-size: 20px;
    }

    a {
      text-decoration: none;
      color: rosybrown
    }
  </style>
</head>

<body>
  <div class="business-card">
    <img class="profile-image" src="https://cdn.freecodecamp.org/curriculum/labs/flower.jpg"
      alt="this is pink flower,what's kind of that?">
    <p class="full-name">郭长松</p>
    <p class="designation">全栈开发</p>
    <p class="company">@freecodecamp</p>
    <hr>
    <p>18671369668@163.com</p>
    <p>+86 18671369668</p>
    <a class="portfolio-link" href="https://www.freecodecamp.org/" target="_blank">Portfolio</a>
    <hr>
    <div class="social-media">
      <h2>Connect with me</h2>
      <a href="https://www.twitter.com">Twitter</a>
      <a href="https://www.linkedin.com">LinkedIn</a>
      <a href="https://www.github.com">GitHub</a>
    </div>
  </div>
</body>

</html>
