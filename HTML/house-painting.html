<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern House Painting</title>
    <link rel="stylesheet" href="house-painting.css">
</head>
<body>
    <div class="scene">
        <div class="sky">
            <div class="sun"></div>
            <div class="cloud cloud-1"></div>
            <div class="cloud cloud-2"></div>
            <div class="cloud cloud-3"></div>
            <div class="stars"></div>
        </div>
        <div class="ground"></div>
        <div class="house-shadow"></div>
        <div id="house">
            <div class="smoke">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <div id="chimney"></div>
            <div id="roof"></div>
            <div id="window-1"></div>
            <div id="window-2"></div>
            <div id="door"></div>
        </div>
        <div class="path"></div>
        <div class="tree">
            <div class="tree-top"></div>
            <div class="tree-trunk"></div>
        </div>
        <div class="bush bush-1"></div>
        <div class="bush bush-2"></div>
        <div class="lamp"></div>
    </div>
</body>
</html>
