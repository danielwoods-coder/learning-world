<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Checkout Page</title>
</head>

<body>
    <h1>Checkout</h1>
    <section>
        <h2>Your Cart</h2>
        <img src="https://cdn.freecodecamp.org/curriculum/labs/cube.jpg" alt="This is a colorful Rubik's Cube.">
        <p>魔方：15元</p>
    </section>
    <section>
        <h2>Payment Information</h2>
        <form>
            <label for="card-name"><span aria-hidden="true">*</span>Card-name:</label>
            <input id="card-name" name="card-name" type="text" required>
            <label for="card-number"><span aria-hidden="true">*</span>Card-number:</label>
            <input id="card-number" name="card-number" type="text" required aria-describedby="card-number-help">
            <p id="card-number-help">Please enter your 16-digit card number without spaces or dashes.</p>
        </form>

    </section>
</body>

</html>
